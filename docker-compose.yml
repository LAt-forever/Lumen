services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lumen
      POSTGRES_USER: lumen
      POSTGRES_PASSWORD: lumen
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumen -d lumen"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    environment:
      LUMEN_DATABASE_URL: postgresql+psycopg://lumen:lumen@postgres:5432/lumen
      LUMEN_CELERY_BROKER_URL: redis://redis:6379/0
      LUMEN_CELERY_RESULT_BACKEND: redis://redis:6379/1
      LUMEN_DATA_DIR: /app/data
      LUMEN_UPLOAD_STORAGE_PATH: /app/data/uploads
      LUMEN_LLM_MODE: extractive
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - "8000:8000"
    volumes:
      - lumen-data:/app/data

  worker:
    build:
      context: ./backend
    command: ["uv", "run", "celery", "-A", "service.worker:celery_app", "worker", "--loglevel=info", "--concurrency=1"]
    environment:
      LUMEN_DATABASE_URL: postgresql+psycopg://lumen:lumen@postgres:5432/lumen
      LUMEN_CELERY_BROKER_URL: redis://redis:6379/0
      LUMEN_CELERY_RESULT_BACKEND: redis://redis:6379/1
      LUMEN_DATA_DIR: /app/data
      LUMEN_UPLOAD_STORAGE_PATH: /app/data/uploads
      LUMEN_LLM_MODE: extractive
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - lumen-data:/app/data

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE: http://127.0.0.1:8000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:5173"

volumes:
  postgres-data:
  lumen-data:
